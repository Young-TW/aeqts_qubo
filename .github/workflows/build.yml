name: Build CUDA and HIP

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Build for CUDA
  build-cuda:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    # Install CUDA Toolkit
    - name: Set up CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.14
      with:
        cuda: '12.3.0'
        method: 'network'
        sub-packages: '["nvcc", "cudart-dev"]'

    - name: Install Dependencies (cuRAND & MPI)
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurand-dev-12-3 openmpi-bin libopenmpi-dev

    # Configure CMake
    - name: Configure CMake (CUDA)
      run: >
        cmake -B build
        -DBACKEND=CUDA
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_CUDA_ARCHITECTURES=75

    # Build the project
    - name: Build (CUDA)
      run: cmake --build build --verbose

  # Job 2: Build for HIP (ROCm)
  build-hip:
    runs-on: ubuntu-22.04
    # Run inside a Docker container that has the ROCm environment pre-installed
    container:
      image: rocm/dev-ubuntu-22.04:7.2 # Adjust ROCm version as needed
      options: --user root
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y rocthrust-dev hiprand-dev rocrand-dev cmake git

    - name: Configure CMake (HIP)
      run: >
        cmake -B build
        -DBACKEND=HIP
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_HIP_ARCHITECTURES=gfx90a

    - name: Build (HIP)
      run: cmake --build build --verbose
